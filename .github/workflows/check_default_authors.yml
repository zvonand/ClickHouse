name: Check commit authors

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  check_authors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for default/generic author or committer
        run: |
          blocked='ubuntu|root|ec2-user|centos|fedora|debian|admin|bitnami|azureuser|gce-user|runner|jenkins|nobody|user|test|default|guest'

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          # For new branches, check only the head commit
          if [ "$base" = "0000000000000000000000000000000000000000" ]; then
            commits="$head"
          else
            commits=$(git log --format='%H' "$base".."$head")
          fi

          failed=0
          for sha in $commits; do
            author=$(git log -1 --format='%an <%ae>' "$sha")
            committer=$(git log -1 --format='%cn <%ce>' "$sha")
            for identity in "$author" "$committer"; do
              if echo "$identity" | grep -qiw -E "$blocked"; then
                echo "::error::Commit $sha has a default/generic identity: $identity"
                failed=1
              fi
            done
          done

          if [ "$failed" -eq 1 ]; then
            echo "Please set your git identity with:"
            echo "  git config user.name \"Your Name\""
            echo "  git config user.email \"your@email.com\""
            exit 1
          fi
